name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Asset integrity check
        run: node scripts/check-assets.mjs

      - name: Basic HTML sanity
        run: |
          test -f index.html
          grep -q "<title>" index.html
          grep -q 'id="ro-' index.html  # RideOut customization blocks present
          echo "✅ index.html looks sane"
