# Netlify config — static site served from the repo root, no build step.

[build]
  publish = "."
  command = ""

# Ensure the Framer hydration chunk is served as JavaScript.
[[headers]]
  for = "/assets/scripts/*"
  [headers.values]
    Content-Type = "text/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Long-cache all other hashed assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
